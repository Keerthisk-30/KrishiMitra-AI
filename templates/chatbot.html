{% extends 'base.html' %}

{% block content %}

<h2 class="mb-4 text-success">

    AI Farmer Chatbot

</h2>

<div class="card shadow-sm">

    <div class="card-body">

        <!-- CHAT AREA -->

        <div id="chatBox"
             style="
             height:400px;
             overflow-y:auto;
             background:#f8f9fa;
             padding:15px;
             border-radius:10px;
             ">

        </div>

        <!-- INPUT -->

        <form id="chatForm"
              class="mt-3">

            <div class="input-group">

                <input type="text"
                       id="userMessage"
                       class="form-control"
                       placeholder="Ask farming question..."
                       required>

                <button class="btn btn-success">

                    Send

                </button>

            </div>

        </form>

    </div>

</div>

<script>

document
.getElementById('chatForm')
.addEventListener(
    'submit',

    async function(e) {

        e.preventDefault();

        const input =
            document.getElementById(
                'userMessage'
            );

        const message =
            input.value;

        const chatBox =
            document.getElementById(
                'chatBox'
            );

        // USER MESSAGE

        chatBox.innerHTML += `
            <div class="text-end mb-3">

                <span class="badge bg-success p-3">

                    ${message}

                </span>

            </div>
        `;

        // CLEAR INPUT

        input.value = '';

        // SEND TO SERVER

        const response =
            await fetch('/chatbot-api', {

                method: 'POST',

                headers: {

                    'Content-Type':
                    'application/json'
                },

                body: JSON.stringify({

                    message: message
                })
            });

        const data =
            await response.json();

        // BOT REPLY

        chatBox.innerHTML += `
            <div class="text-start mb-3">

                <span class="badge bg-secondary p-3">

                    ${data.reply}

                </span>

            </div>
        `;

        // AUTO SCROLL

        chatBox.scrollTop =
            chatBox.scrollHeight;
    }
);

</script>

{% endblock %}
