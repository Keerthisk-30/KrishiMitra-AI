{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow">
            <div class="card-body">
                <h2 class="mb-4 text-center text-success">Farmer Registration</h2>
                <form method="POST">
                    <input type="text"
                           name="name"
                           placeholder="Enter Name"
                           class="form-control mb-3"
                           required>
                    <input type="email"
                           name="email"
                           placeholder="Enter Email"
                           class="form-control mb-3"
                           required>
                    <input type="password"
                           name="password"
                           placeholder="Enter Password"
                           class="form-control mb-3"
                           required>
                    <button class="btn btn-success w-100">
                        Register
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
