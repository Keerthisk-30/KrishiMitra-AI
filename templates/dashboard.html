{% extends 'base.html' %}

{% block content %}

<h2 class="mb-4 text-success">
    Farmer Knowledge Feed
</h2>

<!-- Search Form -->

<form method="GET"
      action="/dashboard"
      class="mb-4">

    <div class="input-group">

        <input type="text"
               name="search"
               class="form-control"
               placeholder="Search crop issues...">

        <button class="btn btn-success">

            Search

        </button>

    </div>

</form>

<!-- Posts -->

{% for post in posts %}

<div class="card shadow-sm mb-4">

    <div class="card-body">

        <!-- Crop Name -->

        <h3 class="text-success">

            {{ post[2] }}

        </h3>

        <!-- Issue Title -->

        <h5>

            {{ post[3] }}

        </h5>

        <!-- Description -->

        <p class="mt-3">

            {{ post[4] }}

        </p>

        <!-- AI Summary -->

        <div class="alert alert-success mt-3">

            <strong>

                AI Summary:

            </strong>

            <br><br>

            {{ post[7] }}

            <br><br>

            <!-- AI Voice -->

            <audio controls class="mt-2 w-100">

                <source src="{{ url_for(
                    'static',
                    filename='audio/' + post[9]
                ) }}"
                type="audio/mpeg">

            </audio>

        </div>

        <!-- AI Keywords -->

        <div class="alert alert-warning mt-3">

            <strong>

                AI Keywords:

            </strong>

            <br>

            {{ post[8] }}

        </div>

        <!-- Image -->

        <img src="{{ url_for(
            'static',
            filename='uploads/' + post[5]
        ) }}"
        class="img-fluid rounded mt-3"
        width="350">

    </div>

</div>

{% endfor %}

{% endblock %}
